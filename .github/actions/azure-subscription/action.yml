name: Azure subscription
description: az account set when subscription id is provided
inputs:
  subscription-id:
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        SUB="${{ inputs.subscription-id }}"
        if [ -n "$SUB" ]; then
          az account set --subscription "$SUB"
        fi
