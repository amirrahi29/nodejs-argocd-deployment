name: Build and push image (ACR + GitOps tag)

on:
  push:
    branches: [main, dev, staging, uat]
    paths-ignore:
      - "gitops/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  ACR_NAME: rahicontaineregistry
  ACR_LOGIN_SERVER: rahicontaineregistry.azurecr.io
  IMAGE_NAME: chat-app
  GITOPS_CHART_DIR: gitops/helm/chat-app

jobs:
  build-push-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure subscription and ACR
        run: |
          set -euo pipefail
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          [ -z "$SUB" ] || az account set --subscription "$SUB"
          az account show -o table
          az acr show -n "$ACR_NAME" --query "{name:name,loginServer:loginServer}" -o table

      - name: Branch and image tag
        run: |
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_REF#refs/heads/}-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - run: az acr login --name "$ACR_NAME"

      - name: Docker build and push
        run: |
          docker build -t "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" ./app
          docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-yaml

      - name: Update Helm values image tag
        run: |
          python3 <<'PY'
          import os, pathlib, yaml
          b, tag = os.environ["BRANCH"], os.environ["IMAGE_TAG"]
          repo = f'{os.environ["ACR_LOGIN_SERVER"]}/{os.environ["IMAGE_NAME"]}'
          p = pathlib.Path(os.environ["GITOPS_CHART_DIR"]) / f"values-{b}.yaml"
          d = yaml.safe_load(p.read_text()) or {}
          d.setdefault("image", {})
          d["image"]["repository"], d["image"]["tag"] = repo, tag
          p.write_text(yaml.dump(d, default_flow_style=False, sort_keys=False))
          PY

      - name: Helm template validate
        run: |
          f="${GITOPS_CHART_DIR}/values-${BRANCH}.yaml"
          test -f "$f" || { echo "::error::Missing $f"; exit 1; }
          helm template "chat-app-${BRANCH}" "${GITOPS_CHART_DIR}" \
            -f "${GITOPS_CHART_DIR}/values.yaml" -f "$f"

      - name: Commit and push values (rebase retries)
        run: |
          set -euo pipefail
          BR="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${GITOPS_CHART_DIR}/values-${BRANCH}.yaml"
          git diff --staged --quiet && exit 0
          git commit -m "chore(gitops): bump ${IMAGE_NAME} ${IMAGE_TAG}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BR" && git push origin "$BR" && exit 0
            echo "::warning::retry $i"
            sleep $((i * 4))
          done
          exit 1
