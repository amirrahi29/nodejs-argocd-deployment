name: Build and push to Azure ACR

"on":
  push:
    branches:
      - "**"
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: rahicontainerregistry.azurecr.io
  ACR_NAME: rahicontainerregistry

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ toLower(github.event.repository.name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure login (AZURE_CREDENTIALS JSON)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry (Docker)
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Docker image metadata (enterprise tagging)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=long
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.url=${{ github.event.repository.html_url }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}.git
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.revision=${{ github.sha }}
            com.github.workflow.run_id=${{ github.run_id }}
            com.github.workflow.run_number=${{ github.run_number }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.run_number }}-${{ github.run_attempt }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy reference (Argo / Helm - pin by digest)
        run: |
          {
            echo "### Container image (enterprise)"
            echo ""
            echo "**Immutable digest (recommended in prod):**"
            echo '```'
            echo "${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
            echo '```'
            echo ""
            echo "**Tags pushed this run:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo "${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.run_number }}-${{ github.run_attempt }}"
            echo '```'
            echo ""
            echo "| Dimension | Value |"
            echo "|-----------|--------|"
            echo "| Registry | \`${{ env.AZURE_CONTAINER_REGISTRY }}\` |"
            echo "| Repository | \`${{ env.IMAGE_NAME }}\` |"
            echo "| Git SHA | \`${{ github.sha }}\` |"
            echo "| Workflow run | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
