name: Validate Helm charts

on:
  push:
    branches: [main, dev, staging, uat]
    paths:
      - "gitops/**"
      - ".github/workflows/gitops-validate.yml"
  pull_request:
    paths:
      - "gitops/**"
      - ".github/workflows/gitops-validate.yml"

permissions:
  contents: read

env:
  CHART: gitops/helm/chat-app

jobs:
  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Template all env overlays
        run: |
          set -euo pipefail
          for f in "$CHART"/values-*.yaml; do
            case "$(basename "$f")" in values.yaml) continue ;; esac
            e="${f#"$CHART"/values-}"; e="${e%.yaml}"
            helm template "chat-app-$e" "$CHART" -f "$CHART/values.yaml" -f "$f"
          done
