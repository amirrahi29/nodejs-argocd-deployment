name: GitOps — Helm template validate

on:
  push:
    branches: [main, dev, uat, staging]
    paths:
      - "gitops/**"
      - ".github/workflows/gitops-validate.yml"
  pull_request:
    paths:
      - "gitops/**"
      - ".github/workflows/gitops-validate.yml"

permissions:
  contents: read

env:
  GITOPS_CHART_DIR: gitops/helm/chat-app

jobs:
  helm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Validate all branch value overlays
        run: |
          set -euo pipefail
          for f in "${GITOPS_CHART_DIR}"/values-*.yaml; do
            base="${GITOPS_CHART_DIR}/values.yaml"
            case "$(basename "$f")" in
              values.yaml) continue ;;
            esac
            env="${f#"${GITOPS_CHART_DIR}"/values-}"
            env="${env%.yaml}"
            helm template "chat-app-${env}" "${GITOPS_CHART_DIR}" \
              -f "$base" \
              -f "$f"
          done
