name: CI

on:
  push:
    branches: [main, dev, staging, uat]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  HELM_VERSION: v3.14.4
  ACR_NAME: rahicontaineregistry
  ACR_LOGIN_SERVER: rahicontaineregistry.azurecr.io
  IMAGE_NAME: chat-app
  CHART: gitops/helm/chat-app

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app: ${{ steps.filter.outputs.app }}
      gitops: ${{ steps.filter.outputs.gitops }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
            gitops:
              - 'gitops/**'
              - 'scripts/**'
            workflow:
              - '.github/workflows/ci.yml'
              - '.github/workflows/argocd-cluster-sync.yml'

  audit:
    needs: changes
    if: github.event_name == 'pull_request' || needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high

  helm:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - run: bash scripts/helm-template-overlays.sh "${{ env.CHART }}"

  build:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (needs.changes.outputs.app == 'true' || needs.changes.outputs.workflow == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure subscription (optional)
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          [ -z "$SUB" ] || az account set --subscription "$SUB"

      - name: Azure / ACR sanity
        run: |
          set -euo pipefail
          az account show -o table
          az acr show -n "$ACR_NAME" --query "{name:name,loginServer:loginServer}" -o table

      - name: Branch and tag
        run: |
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_REF#refs/heads/}-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - run: az acr login --name "$ACR_NAME"

      - name: Docker build and push
        run: |
          docker build -t "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" ./app
          docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-yaml

      - name: Patch Helm image values
        run: |
          python3 <<'PY'
          import os, pathlib, yaml
          b, tag = os.environ["BRANCH"], os.environ["IMAGE_TAG"]
          repo = f'{os.environ["ACR_LOGIN_SERVER"]}/{os.environ["IMAGE_NAME"]}'
          p = pathlib.Path(os.environ["CHART"]) / f"values-{b}.yaml"
          d = yaml.safe_load(p.read_text()) or {}
          d.setdefault("image", {})
          d["image"]["repository"], d["image"]["tag"] = repo, tag
          p.write_text(yaml.dump(d, default_flow_style=False, sort_keys=False))
          PY

      - name: helm template (current branch overlay)
        run: bash scripts/helm-template-overlays.sh "$CHART" "$BRANCH"

      - name: Commit and push GitOps
        run: |
          set -euo pipefail
          BR="${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CHART/values-${BRANCH}.yaml"
          git diff --staged --quiet && exit 0
          git commit -m "chore(gitops): bump ${IMAGE_NAME} ${IMAGE_TAG}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin "$BR" && git push origin "$BR" && exit 0
            sleep $((i * 4))
          done
          exit 1
