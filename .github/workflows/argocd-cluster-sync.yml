name: Argo CD cluster sync

on:
  push:
    branches: [main]
    paths:
      - "gitops/argocd/**"
      - ".github/workflows/argocd-cluster-sync.yml"
  workflow_dispatch:

concurrency:
  group: argocd-cluster-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    if: vars.AKS_CLUSTER_NAME != '' && vars.AKS_RESOURCE_GROUP != ''
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: ./.github/actions/azure-subscription
        with:
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/setup-kubectl@v4

      - name: Kubeconfig (AKS)
        env:
          USE_ADMIN: ${{ vars.AKS_USE_ADMIN_KUBECONFIG }}
        run: |
          set -euo pipefail
          ARGS=(--resource-group "${{ vars.AKS_RESOURCE_GROUP }}" --name "${{ vars.AKS_CLUSTER_NAME }}" --overwrite-existing)
          if [ "${USE_ADMIN:-}" = "true" ]; then ARGS+=(--admin); fi
          az aks get-credentials "${ARGS[@]}"

      - name: Apply Argo CD application manifests
        run: kubectl apply -n argocd -f gitops/argocd/applications/
