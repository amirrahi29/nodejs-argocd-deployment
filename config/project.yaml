# Single place to tune this template for another org/project. Then run:
#   python3 scripts/apply-project-config.py --sync-files && git diff
# CI reads this file at runtime (no need to sync for ACR/build unless you want Git copies updated).

git:
  repo_url: https://github.com/amirrahi29/nodejs-argocd-deployment.git
  # Branch the argocd-platform Application uses for gitops/argocd/platform/
  platform_branch: main

azure:
  acr_name: rahicontaineregistry
  acr_login_server: rahicontaineregistry.azurecr.io

app:
  image_name: chat-app

helm:
  chart_path: gitops/helm/chat-app
  version: v3.14.4

# AKS (names are not secrets — live in Git). Empty this block to skip cluster apply job.
aks:
  resource_group: RahiResource
  cluster_name: ChatAppCluster
  # use_admin_kubeconfig: true   # only if az get-credentials needs --admin
