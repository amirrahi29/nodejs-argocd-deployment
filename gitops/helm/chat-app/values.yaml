replicaCount: 1

image:
  repository: rahicontaineregistry.azurecr.io/chat-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 3000

env:
  NODE_ENV: production
  DEPLOY_ENV: default

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
