apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: chat-app-dev
  namespace: argocd
spec:
  description: chat-app - dev
  sourceRepos:
  - '*'
  destinations:
  - name: in-cluster
    namespace: dev
    server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
---
