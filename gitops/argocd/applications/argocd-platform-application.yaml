apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-platform
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: chat-app-gitops
spec:
  project: chat-app-platform
  source:
    repoURL: https://github.com/amirrahi29/nodejs-argocd-deployment.git
    targetRevision: dev
    path: gitops/argocd/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
