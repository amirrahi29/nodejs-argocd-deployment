apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chat-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/CHANGE_ME_ORG/CHANGE_ME_GITOPS_REPO.git
    targetRevision: dev
    path: helm/chat-app
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
