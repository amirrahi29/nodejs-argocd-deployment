# Default Git branch for platform + Argo root manifests: main (see .github/workflows/ci.yml).
# Environments: Helm overlays gitops/helm/chat-app/values-<env>.yaml + ApplicationSet (targetRevision per env).
# After edits, on main you can run: python3 gitops/apply-project-config.py --sync-files

git:
  repo_url: https://github.com/amirrahi29/nodejs-argocd-deployment.git
  platform_branch: main
  platform_path: gitops/argocd/platform

azure:
  acr_name: rahicontaineregistry
  acr_login_server: rahicontaineregistry.azurecr.io
  tenant_id:
  subscription_id:
  client_id:

app:
  image_name: chat-app

helm:
  chart_path: gitops/helm/chat-app
  version: v3.14.4

argocd:
  app_prefix: chat-app

aks:
  resource_group: RahiResource
  cluster_name: ChatAppCluster
